      @media print {

        }
        body {

        .print\:hidden {
          display: none !important;

        .print\:block {
          display: block !important;
        }
        .print\:border {
          border-width: 1px !important;
        }
        .print\:border-black {
          border-color: black !important;
        }
        .print\:bg-white {
          background-color: white !important;
        }
        .print\:text-black {
          color: black !important;
        }
        .print\:shadow-none {
          box-shadow: none !important;
        }
        /* Hide scrollbars */
        ::-webkit-scrollbar {
          display: none;
        }
      }
    </style>
